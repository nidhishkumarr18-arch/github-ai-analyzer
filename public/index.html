<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub AI Analyzer</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <header>
            <h1>GitHub AI Analyzer <span class="badge">PRO</span></h1>
            <p>Enter a GitHub username to generate deep AI insights.</p>
        </header>

        <main>
            <div class="search-box">
                <input type="text" id="username" placeholder="e.g., torvalds" autocomplete="off">
                <button id="analyze-btn">Analyze Profile</button>
            </div>

            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>Analyzing profile and generating AI insights...</p>
            </div>

            <div id="error" class="hidden glass-panel error-panel">
                <h3 id="error-message">User not found</h3>
            </div>

            <div id="results" class="hidden">
                <div class="grid">
                    <!-- Profile Stats -->
                    <div class="glass-panel profile-card">
                        <div class="profile-header">
                            <h2 id="r-name">Name</h2>
                            <p id="r-username">@username</p>
                        </div>
                        <p id="r-bio" class="bio">Bio goes here</p>
                        
                        <div class="stats">
                            <div class="stat">
                                <span class="value" id="r-repos">0</span>
                                <span class="label">Repos</span>
                            </div>
                            <div class="stat">
                                <span class="value" id="r-followers">0</span>
                                <span class="label">Followers</span>
                            </div>
                            <div class="stat">
                                <span class="value" id="r-stars">0</span>
                                <span class="label">Stars</span>
                            </div>
                        </div>

                        <div class="languages">
                            <h3>Top Languages</h3>
                            <div id="r-languages" class="tags"></div>
                        </div>
                    </div>

                    <!-- AI Insights -->
                    <div class="glass-panel insights-card">
                        <div class="ai-header">
                            <h2>✨ AI Insights</h2>
                            <span class="powered-by">Powered by Gemini</span>
                        </div>
                        <div id="r-ai-insights" class="ai-content"></div>
                    </div>
                </div>

                <!-- Recent Repositories -->
                <div class="glass-panel repos-section">
                    <h2>Recent Repositories</h2>
                    <div id="r-repos-list" class="repos-grid"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
